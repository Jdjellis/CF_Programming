# This repo is now a Claude skill (skills/crossfit-coach), not an installable
# package. The deterministic calculator is vendored under the skill and run
# directly (the scripts put it on the path themselves) — no build/install step.
# This file only configures the test run for the surviving arithmetic core.

[tool.pytest.ini_options]
testpaths = ["skills/crossfit-coach/scripts/tests"]
addopts = "-q"
